{% extends "base.html" %}

{% block contenido %}

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST">

    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ingrese el nombre" value="{{ persona.nombre or '' }}" required>
    </div>

    <div class="mb-3">
        <label for="edad" class="form-label">Edad</label>
        <input type="number" id="edad" name="edad" class="form-control" placeholder="Ingrese la edad" value="{{ persona.edad or '' }}" min="1" required>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="Ingrese el email" value="{{ persona.email or '' }}" required>
    </div>

    <button type="submit" class="btn btn-success">Guardar cambios</button>
</form>

<br>
<a href="/lista" class="btn btn-secondary">Volver</a>

{% endblock %}
