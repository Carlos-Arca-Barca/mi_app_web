{% extends "base.html" %}

{% block contenido %}

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Email</th>
            <th>Fecha Nac.</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
    {% for d in datos %}
        <tr>
            <td>{{ d.nombre }}</td>
            <td>{{ d.edad }}</td>
            <td>{{ d.email }}</td>
            <td>{{ d.fecha_nac }}</td>
            <td>
                <a href="/editar/{{ d.id_contacto }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/eliminar/{{ d.id_contacto }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

<a href="/" class="btn btn-primary">Nuevo registro</a>

{% endblock %}
